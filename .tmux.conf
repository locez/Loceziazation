# ==========================================
# Tmux 现代极客配置 - 专为 Alacritty + Wayland 打造
# ==========================================

# ==========================
# 1. 核心体验与 Prefix 键修改
# ==========================
# 将 Prefix 键从反人类的 Ctrl-b 改为黄金位置的 Ctrl-a
unbind C-b
set-option -g prefix C-a
# 连按两次 Ctrl-a 可以把按键传递给内部程序 (用于 Bash/Zsh 光标回行首)
bind C-a send-prefix

# 消除按 ESC 键的延迟 (Vim/Neovim 用户的救命设置)
set -sg escape-time 10

# 内部程序（如 Vim）应该认为自己运行在什么终端下
set -g default-terminal "tmux-256color"

# 开启真色彩 (True Color) 支持，确保 Alacritty 里的代码高亮依然鲜艳
set -as terminal-features ",alacritty:RGB"
set -ag terminal-overrides ",alacritty:Tc"

# 开启全局鼠标支持 (支持滚轮直接看历史记录，鼠标拖拽调大小)
set -g mouse on

# 将历史记录缓冲区上限调大 (看长长的编译日志不再被截断)
set -g history-limit 100000

# 让窗口和窗格的编号从 1 开始 (键盘上的 0 太远了)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
# 关闭某个窗口后，自动重新排序编号，保持整洁
set-option -g renumber-windows on

# ==========================
# 2. 高效快捷键绑定
# ==========================
# 快速重载配置文件 (Prefix + r)，改完立刻生效
bind r source-file ~/.tmux.conf \; display "🚀 Tmux Config Reloaded!"

# 新窗口和分屏时，默认继承当前工作目录 (写代码时体验极佳)
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}" # 横向分屏
bind - split-window -v -c "#{pane_current_path}" # 纵向分屏

# 像 Vim 一样在窗格间移动光标 (Prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 无需 Prefix，按住 Alt + 左右方向键 直接在窗口间快速切换
bind -n M-Left previous-window
bind -n M-Right next-window

# ==========================
# 3. 复制模式 (Vim 风格 + Wayland 剪贴板)
# ==========================
# 开启 Vim 风格的按键模式
setw -g mode-keys vi

# 按 Prefix + [ 进入复制模式 (或者直接鼠标向上滚轮)
bind [ copy-mode

# 按 v 开始选择文本
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle

# 【Wayland 专属】按 y 复制选中内容并退出，直接送入桌面系统剪贴板
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# ==========================
# 4. 状态栏美化 (Tokyo Night 极简风 + 原生负载监控)
# ==========================
set -g status-position top
# 状态栏刷新间隔设为 2 秒，让负载数据动起来
set -g status-interval 2
set -g status-justify left

# 整体背景色和前景色
set -g status-bg "#1a1b26"
set -g status-fg "#a9b1d6"

# 左侧：Session 名称
set -g status-left-length 40
set -g status-left "#[bg=#7aa2f7,fg=#15161e,bold] 🚀 #S #[bg=#1a1b26,fg=#7aa2f7]"

# 右侧：时间 (暗灰) <- 负载 (紫) <- 主机名 (亮蓝)
set -g status-right-length 100
# 这里的 #(cut -d ' ' -f 1-3 /proc/loadavg) 是直接用原生 shell 命令极速读取系统 1分钟/5分钟/15分钟 负载
set -g status-right "#[fg=#414868]#[bg=#414868,fg=#a9b1d6] %m-%d %H:%M #[fg=#bb9af7,bg=#414868]#[bg=#bb9af7,fg=#15161e,bold]  #(cut -d ' ' -f 1-3 /proc/loadavg) #[fg=#7aa2f7,bg=#bb9af7]#[bg=#7aa2f7,fg=#15161e,bold] ⚡ #h "

# 未选中的窗口样式
setw -g window-status-format "#[fg=#1a1b26,bg=#414868]#[fg=#a9b1d6,bg=#414868] #I: #W #[fg=#414868,bg=#1a1b26]"

# 当前激活的窗口样式
setw -g window-status-current-format "#[fg=#1a1b26,bg=#e0af68]#[fg=#15161e,bg=#e0af68,bold] #I: #W #[fg=#e0af68,bg=#1a1b26]"

# 窗口有活动时的提醒颜色
setw -g window-status-activity-style "bg=#1a1b26,fg=#f7768e,bold"


# ==========================
# 5. 终极智能鼠标滚轮逻辑 (拯救 Vim/Bat/Less 体验)
# ==========================
# 判断逻辑：
# 1. 如果程序自己请求了鼠标捕获 (如开启了 set mouse=a 的 Vim)，直接传递鼠标事件
# 2. 如果程序运行在备用屏幕 (Alternate Screen，如 bat, less, man)，将滚轮转换为发送“向上/向下”方向键 (每次滚轮发送 3 次方向键，实现平滑滚动)
# 3. 如果在普通命令行，则正常进入 Tmux 的复制模式翻阅历史记录

# 向上滚动逻辑
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
    "send-keys -M" \
    "if -Ft= '#{pane_in_mode}' \
        'send-keys -M' \
        'if -Ft= \"#{alternate_on}\" \"send-keys -t= Up Up Up\" \"copy-mode -e; send-keys -M\"'"

# 向下滚动逻辑
bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" \
    "send-keys -M" \
    "if -Ft= '#{pane_in_mode}' \
        'send-keys -M' \
        'if -Ft= \"#{alternate_on}\" \"send-keys -t= Down Down Down\" \"send-keys -M\"'"
